name: Build, Push and Deploy to Azure

on:
  push:
    branches: [ main ]

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  TAG: ${{ github.sha }}
  TFSTATE_STORAGE_ACCOUNT_NAME: ${{ secrets.TFSTATE_STORAGE_ACCOUNT_NAME }}
  TFSTATE_CONTAINER_NAME: ${{ secrets.TFSTATE_CONTAINER_NAME }}
  TF_LOCATION_PRIMARY: ${{ secrets.TF_LOCATION_PRIMARY }}
  TF_LOCATION_SECONDARY: ${{ secrets.TF_LOCATION_SECONDARY }}
  # Terraform OIDC Environment Variables
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_USE_OIDC: true

jobs:
  infrastructure-and-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0" # Or your preferred version
          terraform_wrapper: false   # Setting this to false makes raw CLI output easier to read in logs

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="storage_account_name=$TFSTATE_STORAGE_ACCOUNT_NAME" \
            -backend-config="container_name=$TFSTATE_CONTAINER_NAME"
        working-directory: ./terraform

      - name: Resolve Terraform locations
        run: |
          primary="${TF_LOCATION_PRIMARY:-eastus}"
          secondary="${TF_LOCATION_SECONDARY:-$primary}"
          echo "TF_VAR_location_primary=$primary" >> "$GITHUB_ENV"
          echo "TF_VAR_location_secondary=$secondary" >> "$GITHUB_ENV"

      # Bootstrap Stage: ACR must exist before Docker can push to it
      - name: Terraform Bootstrap (ACR)
        run: |
          terraform apply -no-color -input=false -lock-timeout=10m -auto-approve \
            -target=azurerm_container_registry.acr \
            -target=azurerm_user_assigned_identity.apps_identity \
            -target=azurerm_role_assignment.acr_pull
        working-directory: ./terraform

      - name: Resolve ACR details from Terraform outputs
        run: |
          echo "ACR_NAME=$(terraform output -raw acr_name)" >> "$GITHUB_ENV"
          echo "REGISTRY=$(terraform output -raw acr_login_server)" >> "$GITHUB_ENV"
        working-directory: ./terraform

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build & Push Images
        run: |
          docker build -f DocMan.Api/Dockerfile -t $REGISTRY/docman-api:$TAG -t $REGISTRY/docman-api:latest .
          docker push $REGISTRY/docman-api:$TAG
          docker push $REGISTRY/docman-api:latest

          docker build -f DocMan.Worker/Dockerfile -t $REGISTRY/docman-worker:$TAG -t $REGISTRY/docman-worker:latest .
          docker push $REGISTRY/docman-worker:$TAG
          docker push $REGISTRY/docman-worker:latest

          docker build -f Frontend/docman/Dockerfile -t $REGISTRY/docman-frontend:$TAG -t $REGISTRY/docman-frontend:latest Frontend/docman
          docker push $REGISTRY/docman-frontend:$TAG
          docker push $REGISTRY/docman-frontend:latest

      # Final Apply Stage
      - name: Terraform Apply (Full)
        run: terraform apply -no-color -input=false -lock-timeout=10m -auto-approve -var="image_tag=$TAG"
        working-directory: ./terraform
